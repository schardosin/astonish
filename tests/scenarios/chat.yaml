  # ---------------------------------------------------------------------------
  # Section F — Session & Lifecycle Authorization
  # ---------------------------------------------------------------------------

  - id: CHAT-026
    title: "User cannot access another user's personal session by ID"
    user_story: |
      As Alice, I create a session. Eve (different org) tries to fetch
      that session by ID — she receives a 404 or empty result. The session
      is invisible across org boundaries.

      Note: the chat handler currently accepts a client-supplied sessionId on
      POST /api/studio/chat without an ownership check, so the SSE stream may
      echo Eve's sessionId back. The real boundary is data isolation: the
      session service is resolved per-org, so Eve's writes land in her own
      personal store and Alice's session content remains untouched. Tests
      assert content isolation (Alice fetches her session and Eve's text is
      absent), not the cosmetic sessionId echo.
    priority: P0
    status: covered

  - id: CHAT-027
    title: "Cross-team session access is denied"
    user_story: |
      As Alice (team red), I create a session. Carol (team blue, same org)
