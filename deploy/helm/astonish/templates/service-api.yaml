apiVersion: v1
kind: Service
metadata:
  name: {{ include "astonish.fullname" . }}-api
  labels:
    {{- include "astonish.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "astonish.apiSelectorLabels" . | nindent 4 }}
