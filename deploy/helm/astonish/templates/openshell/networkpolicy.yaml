{{- if .Values.sandbox.openshell.enabled }}
---
# NetworkPolicy: Restrict sandbox namespace egress.
#
# Sandbox pods (in the non-mesh namespace) are only permitted to reach:
#   1. The OpenShell gateway in the control-plane namespace (port 8080/TCP)
#   2. Cluster DNS (kube-system, port 53/UDP+TCP)
#
# All other egress is denied. This provides Layer 3/4 isolation as a
# complement to the Istio Layer 7 AuthorizationPolicy. Even if a sandbox
# pod is compromised, it cannot reach any service other than the gateway.
#
# Note: This NetworkPolicy requires a CNI that supports NetworkPolicy
# enforcement (Calico, Cilium, etc.). K3s ships with kube-router or
# Flannel + network-policy controller by default.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-sandbox-egress
  namespace: {{ include "astonish.namespace.sandbox" . }}
  labels:
    {{- include "astonish.labels" . | nindent 4 }}
    app.kubernetes.io/component: openshell-network
spec:
  # Applies to ALL pods in the sandbox namespace.
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Rule 1: Allow traffic to the OpenShell gateway.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: openshell
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: 8080
          protocol: TCP
    # Rule 2: Allow DNS resolution (required for gateway service discovery).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
