    priority: P1
    status: missing

  # ---------------------------------------------------------------------------
  # Section D — Memory Authorization
  # ---------------------------------------------------------------------------

  - id: CHAT-016
    title: "Agent saves durable infrastructure knowledge in one session and recalls it in a new session"
    user_story: |
      As a user, in one chat session I state durable, environment-specific
      infrastructure facts ("our Proxmox server is named pve-prod-01 and
      its management IP is 192.168.55.42"). The system persists this
      knowledge to the team memory store — either inline via memory_save
      or via the post-turn memory reflector, since hostnames and IPs are
      explicitly listed as durable connection details in the reflector's
      positive criteria. In a brand-new session with empty conversation
      history, I ask for the IP of pve-prod-01. The agent retrieves it
      from team memory (injected at session start or fetched via
      memory_search) and replies with `192.168.55.42`. This proves the
      memory store survives across sessions and is distinct from
      same-session transcript replay (CHAT-002).

      Note: this test deliberately uses TEAM-scoped infrastructure
      knowledge, not personal facts. Personal facts (names, preferences)
      are private and must NOT be saved to team memory — that scenario is
      reserved for a future personal-memory-scope test (out of scope
      until memory_save supports a personal scope path; see CHAT-017 for
      the privacy contract that must be preserved).
    priority: P0
    status: covered

  - id: CHAT-017
    title: "User A's chat cannot retrieve User B's personal memories"
    user_story: |
      As Alice (team red), I search for a memory seeded in Bob's personal
      store. The search returns zero results — Bob's personal data is
      invisible to me even though we are on the same team.
    priority: P0
    status: covered

  - id: CHAT-018
    title: "Team memory is searchable by all team members"
    user_story: |
      As Bob (member of team red), I search for a team memory. The
      search returns the memory that was saved to team red's scope.
      Both Alice and Bob can find it.
    priority: P0
    status: covered

  - id: CHAT-019
    title: "Team A's chat cannot retrieve Team B's memories"
    user_story: |
      As Alice (team red), I search for a memory seeded in team blue's
      scope. The search returns zero results — team blue data does not
      leak to team red, even though both teams are in the same org.
    priority: P0
    status: covered

  - id: CHAT-020
    title: "Org memory is searchable by all teams in the org but not other orgs"
    user_story: |
      As Alice (acme org), I search for an org-level memory. It is returned.
      As Eve (globex org), I perform the same search — zero results. Org
      memory is visible across teams within an org but invisible to outsiders.
    priority: P0
    status: covered

