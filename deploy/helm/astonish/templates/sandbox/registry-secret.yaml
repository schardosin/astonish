{{- if and .Values.sandbox.enabled (eq .Values.sandbox.backend "openshell") }}
{{- if and .Values.sandbox.openshell.registry.username .Values.sandbox.openshell.registry.password }}
{{- $username := .Values.sandbox.openshell.registry.username }}
{{- $password := .Values.sandbox.openshell.registry.password }}
{{- $url := .Values.sandbox.openshell.registry.url | default "" }}
{{- /* Determine the registry server for auth. Docker Hub uses index.docker.io. */ -}}
{{- $server := "https://index.docker.io/v1/" }}
{{- if and $url (not (hasPrefix "docker.io" $url)) }}
  {{- $server = (printf "https://%s" (regexReplaceAll "^https?://" $url "")) }}
{{- end }}
{{- $auth := printf "%s:%s" $username $password | b64enc }}
{{- $dockercfg := printf "{\"auths\":{\"%s\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}" $server $username $password $auth }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.sandbox.openshell.registry.secretName | default "registry-creds" }}
  namespace: {{ include "astonish.namespace.controlPlane" . }}
  labels:
    {{- include "astonish.labels" . | nindent 4 }}
    app.kubernetes.io/component: image-builder
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $dockercfg | b64enc }}
{{- end }}
{{- end }}
