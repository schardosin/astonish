apiVersion: v1
kind: Service
metadata:
  name: {{ include "astonish.fullname" . }}-worker
  labels:
    {{- include "astonish.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "astonish.workerSelectorLabels" . | nindent 4 }}
