name: Docker Incus Image

on:
  # Primary trigger: fires automatically when the Release workflow completes.
  # Using workflow_run instead of release:published because GitHub suppresses
  # downstream workflow triggers when the release is created by GITHUB_TOKEN
  # (which the Release workflow uses via softprops/action-gh-release).
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

  # Manual trigger: for re-running on a specific tag (e.g. if the automatic
  # run failed or was missed).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.9.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and push multi-arch image
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'schardosin/astonish' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event.workflow_run.conclusion == 'success' &&
        startsWith(github.event.workflow_run.head_branch, 'v')))

    steps:
      - name: Determine version tag
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          WORKFLOW_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$WORKFLOW_HEAD_BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Cross-compile Linux binaries
        env:
          VERSION_TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Both binaries need the frontend embedded and version ldflags
          touch web/embed.go
          LDFLAGS="-s -w -X github.com/schardosin/astonish/cmd/astonish.Version=${VERSION_TAG}"

          echo "Building linux/amd64..."
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o astonish-linux-amd64 .

          echo "Building linux/arm64..."
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o astonish-linux-arm64 .

          ls -la astonish-linux-*

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.incus
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            schardosin/astonish-incus:${{ steps.version.outputs.tag }}
            schardosin/astonish-incus:latest
