# Drill View — E2E Scenario Catalog
# Real user journeys exercised against a running Astonish platform.
# Unit-level UI rendering tests (Vitest) are NOT tracked here.
#
# Status: covered | partial | missing
# Priority: P0 (must-have) | P1 (important) | P2 (nice-to-have)

scenarios:

  # ---------------------------------------------------------------------------
  # Suite Management
  # ---------------------------------------------------------------------------

  - id: DRILL-001
     title: "Create a drill suite with config"
     user_story: |
       As a user, I create a drill suite with a name, target flow/URL,
       and infrastructure config. It is persisted and appears in the
       suites list.
     priority: P0
     status: covered
     test_refs:
       - "tests/e2e/drill/drill_crud_test.go::TestE2E_DrillSuite_CRUD"

  - id: DRILL-002
     title: "List, read, and delete a drill suite"
     user_story: |
       As a user, I create a suite, verify it in the list API, read its
       config, delete it, and confirm it's gone.
     priority: P0
     status: covered
     test_refs:
       - "tests/e2e/drill/drill_crud_test.go::TestE2E_DrillSuite_CRUD"

  - id: DRILL-003
     title: "Add drills to a suite"
     user_story: |
       As a user, I add drill scenarios to an existing suite (either
       manually via API or via AI generation). The drills are persisted
       with steps and assertions.
     priority: P0
     status: covered
     test_refs:
       - "tests/e2e/drill/drill_crud_test.go::TestE2E_DrillSuite_CRUD"

  # ---------------------------------------------------------------------------
  # Execution
  # ---------------------------------------------------------------------------

  - id: DRILL-004
    title: "Run a drill suite and receive a report"
    user_story: |
      As a user, I trigger a suite run. The server executes each drill
      against the real target (flow or URL), evaluates assertions, and
      returns a report with pass/fail per drill and per assertion.
    priority: P0
    status: missing
    test_refs: []

  - id: DRILL-005
    title: "Drill step executes real LLM interaction"
    user_story: |
      As a user, I run a drill that includes an LLM interaction step.
      The step sends a real prompt to the LLM, receives a response,
      and the assertion evaluates against the actual output.
    priority: P0
    status: missing
    test_refs: []

  # ---------------------------------------------------------------------------
  # Results
  # ---------------------------------------------------------------------------

  - id: DRILL-006
    title: "View drill report with per-step assertion results"
    user_story: |
      As a user, I retrieve the report for a completed run. Each drill
      shows pass/fail, and each step within shows its output and which
      assertions passed or failed with actual vs. expected.
    priority: P1
    status: missing
    test_refs: []

  - id: DRILL-007
    title: "AI triage explains failed drill"
    user_story: |
      As a user, I view a failed drill result and the server provides
      an AI-generated triage explaining the probable root cause and
      suggesting a fix.
    priority: P1
    status: missing
    test_refs: []
