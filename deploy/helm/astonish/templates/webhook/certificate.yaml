{{- if and .Values.sandbox.enabled .Values.sandbox.webhook.enabled .Values.sandbox.webhook.certManager.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "astonish.fullname" . }}-sandbox-webhook
  namespace: {{ include "astonish.namespace.controlPlane" . }}
  labels:
    {{- include "astonish.labels" . | nindent 4 }}
    app.kubernetes.io/component: sandbox-webhook
spec:
  secretName: {{ include "astonish.fullname" . }}-sandbox-webhook-tls
  dnsNames:
    - {{ include "astonish.fullname" . }}-sandbox-webhook
    - {{ include "astonish.fullname" . }}-sandbox-webhook.{{ include "astonish.namespace.controlPlane" . }}
    - {{ include "astonish.fullname" . }}-sandbox-webhook.{{ include "astonish.namespace.controlPlane" . }}.svc
    - {{ include "astonish.fullname" . }}-sandbox-webhook.{{ include "astonish.namespace.controlPlane" . }}.svc.cluster.local
  issuerRef:
    name: {{ .Values.sandbox.webhook.certManager.issuerRef.name }}
    kind: {{ .Values.sandbox.webhook.certManager.issuerRef.kind | default "ClusterIssuer" }}
    {{- if .Values.sandbox.webhook.certManager.issuerRef.group }}
    group: {{ .Values.sandbox.webhook.certManager.issuerRef.group }}
    {{- end }}
  duration: {{ .Values.sandbox.webhook.certManager.duration | default "8760h" }}
  renewBefore: {{ .Values.sandbox.webhook.certManager.renewBefore | default "720h" }}
{{- end }}
