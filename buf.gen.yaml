version: v2
managed:
  enabled: true
  override:
    - file_option: go_package
      value: github.com/schardosin/astonish/pkg/sandbox/openshell/gen/openshellv1
plugins:
  - remote: buf.build/protocolbuffers/go
    out: pkg/sandbox/openshell/gen/openshellv1
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: pkg/sandbox/openshell/gen/openshellv1
    opt:
      - paths=source_relative
