  # Section B — Tools & Approval
  # ---------------------------------------------------------------------------

  - id: CHAT-006
    title: "Agent calls a safe tool (read-only) and returns the result"
    user_story: |
      As a user, I ask a question that requires a safe tool (e.g., file_tree,
      memory_search). The agent calls the tool without approval, gets a result,
      and incorporates it into its answer.
    priority: P0
    status: covered

  - id: CHAT-007
    title: "Tool requiring approval halts and waits for user decision"
    user_story: |
      As a user, the agent wants to run an unsafe tool. The SSE stream
      emits an approval event, execution pauses, and the test verifies
      the server is blocked waiting for a decision.
    priority: P0
    status: missing

  - id: CHAT-008
    title: "User approves a tool and execution resumes"
    user_story: |
      As a user, after approval is requested I approve the tool. The agent
      executes it successfully and continues with its answer.
    priority: P0
    status: missing

  - id: CHAT-009
    title: "User denies a tool and the agent adapts"
    user_story: |
      As a user, I deny a tool execution. The agent acknowledges the denial
      and adapts its response without executing the tool.
    priority: P1
    status: missing

  - id: CHAT-010
    title: "autoApprove flag bypasses approval gate for unsafe tools"
    user_story: |
      As a user, I send a message with autoApprove=true. The agent calls
      an unsafe tool that would normally require approval, and it executes
      immediately without waiting for my decision.
    priority: P1
    status: covered

  - id: CHAT-011
    title: "Tool creates a file artifact persisted to session"
    user_story: |
      As a user, I ask the agent to write a file. The tool creates an
      artifact that is persisted in the database and retrievable via
      the artifacts API.
    priority: P1
    status: missing

