# 40-seed-base-layer.yaml — one-shot Job that seeds the @base layer.
#
# Sandbox pods need at least ONE layer (the @base) on the layers PVC
# before any template build or session Create will succeed — the
# entrypoint errors out if ASTONISH_LAYER_CHAIN is empty, and the
# backend refuses to create a pod with zero layers.
#
# This Job uses the astonish-sandbox-base image to populate
# astonish-layers/@base/rootfs/ with the same minimal Debian-slim
# userland that the image itself ships. The end state is equivalent
# to what a template builder would produce for "the empty template":
# a ready-to-mount rootfs that overlays cleanly.
#
# The Job is idempotent: if /mnt/astonish-layers/@base/rootfs already
# contains content, it exits 0 without doing anything. That means
# `kubectl apply -f 40-seed-base-layer.yaml` is safe to re-run.
#
# Cluster-admin workflow:
#   1. Apply 00..30 first and wait for the PVCs to be Bound.
#   2. `kubectl apply -f 40-seed-base-layer.yaml`
#   3. `kubectl -n astonish-sandboxes wait job/astonish-seed-base \
#         --for=condition=complete --timeout=300s`
#   4. Delete the Job when the cluster is healthy (optional); the
#      seeded layer persists on the PVC.
apiVersion: batch/v1
kind: Job
metadata:
  name: astonish-seed-base
  namespace: astonish-sandboxes
  labels:
    app.kubernetes.io/part-of: astonish
    app.kubernetes.io/component: seed-job
spec:
  # A single successful completion is enough. No parallelism; writes
  # to the layers PVC are guarded by the rsync idempotency check, but
  # running two seeders simultaneously just wastes CPU.
  completions: 1
  parallelism: 1
  # Retry for up to ~10 minutes (6 attempts * 100s default back-off).
  # Past that, something is wrong with the PVC or the image pull and
  # a human should investigate rather than the Job silently looping.
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: astonish
        app.kubernetes.io/component: seed-job
    spec:
      restartPolicy: OnFailure
      # Seeding writes to the layers PVC; it does NOT need Sysbox.
      # Skip RuntimeClassName so the Job runs on any node.
      containers:
        - name: seed
          # MUST match SandboxKubernetesConfig.SandboxImage — the
          # backend will later spawn sandboxes with this image, so
          # seeding from it guarantees layout compatibility (same
          # coreutils, same /etc, etc.).
          image: docker.io/schardosin/astonish-sandbox-base:latest
          imagePullPolicy: IfNotPresent
          # The base image's default ENTRYPOINT is the overlay
          # composer, which we very much don't want here. Override
          # with an explicit shell command.
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              DEST=/mnt/astonish-layers/@base/rootfs
              if [ -d "$DEST" ] && [ -n "$(ls -A "$DEST" 2>/dev/null)" ]; then
                echo "astonish-seed: @base already present at $DEST; nothing to do"
                exit 0
              fi
              echo "astonish-seed: seeding base layer at $DEST"
              mkdir -p "$DEST"
              # Copy the in-image rootfs (/) into $DEST, excluding the
              # mount points, /proc, /sys, /dev, and the destination
              # itself. The excludes list is static because the base
              # image layout is stable by construction.
              cd /
              tar --numeric-owner --xattrs --acls \
                  --exclude=./proc --exclude=./sys --exclude=./dev \
                  --exclude=./mnt --exclude=./sandbox \
                  --exclude=./var/astonish \
                  -cf - . | tar -xf - -C "$DEST"
              echo "astonish-seed: done"
          volumeMounts:
            - name: layers
              mountPath: /mnt/astonish-layers
      volumes:
        - name: layers
          persistentVolumeClaim:
            claimName: astonish-layers
