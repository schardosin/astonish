apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "astonish.fullname" . }}-config
  labels:
    {{- include "astonish.labels" . | nindent 4 }}
data:
  config.yaml: |
    storage:
      backend: {{ .Values.config.storage.backend }}
      postgres:
        instance_suffix: {{ .Values.config.storage.postgres.instanceSuffix | quote }}
        max_open_conns: {{ .Values.config.storage.postgres.maxOpenConns }}
        max_idle_conns: {{ .Values.config.storage.postgres.maxIdleConns }}
        conn_max_lifetime_minutes: {{ .Values.config.storage.postgres.connMaxLifetimeMinutes }}
      auth:
        mode: {{ .Values.config.auth.mode }}
        {{- if .Values.config.auth.accessTokenTTLMinutes }}
        access_token_ttl_minutes: {{ .Values.config.auth.accessTokenTTLMinutes }}
        {{- end }}
        {{- if .Values.config.auth.refreshTokenTTLDays }}
        refresh_token_ttl_days: {{ .Values.config.auth.refreshTokenTTLDays }}
        {{- end }}
        {{- if not (kindIs "invalid" .Values.config.auth.allowRegistration) }}
        allow_registration: {{ .Values.config.auth.allowRegistration }}
        {{- end }}
        {{- if .Values.config.auth.defaultOrgName }}
        default_org_name: {{ .Values.config.auth.defaultOrgName | quote }}
        {{- end }}
        {{- if .Values.config.auth.defaultOrgSlug }}
        default_org_slug: {{ .Values.config.auth.defaultOrgSlug | quote }}
        {{- end }}
    {{- if .Values.sandbox.enabled }}
    sandbox:
      backend: {{ .Values.sandbox.backend | quote }}
      {{- with .Values.sandbox.limits }}
      limits:
        {{- if .cpu }}
        cpu: {{ .cpu }}
        {{- end }}
        {{- if .memory }}
        memory: {{ .memory | quote }}
        {{- end }}
        {{- if .processes }}
        processes: {{ .processes }}
        {{- end }}
        {{- with $.Values.sandbox.requests }}
        requests:
          {{- if .cpuMillis }}
          cpu_millis: {{ .cpuMillis }}
          {{- end }}
          {{- if .memoryMiB }}
          memory_mib: {{ .memoryMiB }}
          {{- end }}
        {{- end }}
      {{- end }}
      kubernetes:
        in_cluster: true
        namespace: {{ include "astonish.namespace.sandbox" . | quote }}
        control_plane_namespace: {{ include "astonish.namespace.controlPlane" . | quote }}
        overlay_mode: {{ .Values.sandbox.overlay.mode | quote }}
        privileged_pods: {{ .Values.sandbox.overlay.privileged }}
        {{- if not (kindIs "invalid" .Values.sandbox.overlay.hostUsers) }}
        host_users: {{ .Values.sandbox.overlay.hostUsers }}
        {{- end }}
        {{- if .Values.sandbox.overlay.runtimeClassName }}
        runtime_class_name: {{ .Values.sandbox.overlay.runtimeClassName | quote }}
        {{- end }}
        {{- if .Values.sandbox.overlay.fuseDeviceResource }}
        fuse_device_resource: {{ .Values.sandbox.overlay.fuseDeviceResource | quote }}
        {{- end }}
        sandbox_image: {{ include "astonish.sandbox.image" . | quote }}
        layers_pvc_name: {{ .Values.sandbox.storage.layers.pvcName | quote }}
        uppers_pvc_name: {{ .Values.sandbox.storage.uppers.pvcName | quote }}
    {{- end }}
