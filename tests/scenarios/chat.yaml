# Chat View — E2E Scenario Catalog
# Real user journeys exercised against a running Astonish platform.
# Unit-level UI rendering tests (Vitest) are NOT tracked here.
#
# Status: covered | missing
# Priority: P0 (must-have) | P1 (important) | P2 (nice-to-have)
view: chat

scenarios:

  # ---------------------------------------------------------------------------
  # Section A — Basic Conversation
  # ---------------------------------------------------------------------------

  - id: CHAT-001
    title: "User sends a message and receives a complete LLM response"
    user_story: |
      As a user, I type a question and press Enter. The real LLM generates
      a response streamed via SSE through the real server. I receive a
      complete, coherent answer.
    priority: P0
    status: covered

  - id: CHAT-002
    title: "Multi-turn conversation continues prior task without re-statement"
    user_story: |
      As a user, I send a follow-up message that references the agent's
      previous reply (e.g. "now translate them to Spanish") without
      re-stating any of the prior content. The agent uses the prior
      assistant output as the input for the new task.
      This verifies multi-turn task continuation via session-history
      replay. It deliberately does NOT test recalling a fact the user
      stated (which is a tautology — the LLM trivially has its own
      context window). Cross-session memory is covered by CHAT-016.
    priority: P0
    status: covered

  - id: CHAT-003
    title: "User stops an active LLM stream mid-response"
    user_story: |
      As a user, I click Stop while the LLM is streaming. The server
      aborts the generation, partial text is persisted to the session,
      and I can send a new message.
    priority: P1
    status: missing

  - id: CHAT-004
    title: "Session persists and reloads after page refresh"
    user_story: |
      As a user, I have a conversation, close the browser, reopen, and
      see my previous session in the sidebar. Clicking it restores the
      full message history from the database.
    priority: P0
    status: covered

  - id: CHAT-005
    title: "Reconnect to an active session shows live output"
    user_story: |
      As a user, I open a session that is still running (e.g., from
      another tab). I see the live LLM output resume via SSE reconnection.
    priority: P1
    status: missing

