apiVersion: v2
name: astonish
description: Astonish AI Operations Platform - multi-tenant deployment with API, Worker, and Kubernetes sandbox backend
type: application
version: 0.2.0
appVersion: "dev"
keywords:
  - ai
  - agent
  - platform
  - multi-tenant
  - sandbox
maintainers:
  - name: SAP

# Prerequisites (cluster-scoped, NOT managed by this chart):
#   1. Istio installed; control-plane namespace labeled istio-injection=enabled
#   2. Agent Sandbox CRD + controller:
#      kubectl apply -f https://github.com/kubernetes-sigs/agent-sandbox/releases/latest/download/manifest.yaml

dependencies:
  - name: helm-chart
    alias: openshell
    # 0.0.86: PVC mounts via driver_config (≥0.0.81) + Landlock ABI v5 PTY (≥0.0.70).
    # Run `helm dependency update` after bumping.
    version: "0.0.86"
    repository: "oci://ghcr.io/nvidia/openshell"
    condition: sandbox.openshell.enabled
