    priority: P0
    status: covered

  - id: CHAT-069
    title: "Standard MCP server install in platform mode persists encrypted env without breaking JSONB"
    user_story: |
      As a platform admin, I install a standard MCP server (e.g. Tavily)
      via POST /api/standard-servers/{id}/install?scope=platform with an
      env map containing a real API key. The install succeeds (HTTP 200)
      even when the platform master key is set, because the encrypted env
      bytes are wrapped as a base64 JSON envelope ({"_encrypted":"..."})
      before being written to the JSONB env column. The follow-up GET
      /api/mcp-platform/servers?scope=platform returns the server with
      its env decrypted and equal to what was sent. Pins the fix for
      the SQLSTATE 22021 ("invalid byte sequence for encoding UTF8")
      regression that fired the first time a platform-tier MCP install
      was attempted with a configured ASTONISH_MASTER_KEY and a non-empty
      env map (e.g., TAVILY_API_KEY).
    priority: P0
    status: covered

  - id: CHAT-070
    title: "Standard MCP server installed at platform tier cascades into org/team chats"
    user_story: |
      As a platform admin, I install Tavily at scope=platform. As a
      regular team user (different org/team than where the install was
      configured), my chat agent must immediately see Tavily's tools as
      available — they are not gated to the admin's org. Pins the
      cascade contract: platform → org → team for MCP server tool
      visibility (mirrors the documented inheritance for Services
      .PlatformMCPServers and matches loadMCPConfigForRequest behavior
      already used by HTTP listing endpoints). Without the cascade,
      GET /api/tools called as a team user would not include
      tavily_search, and the chat system prompt would never tell the
      LLM web search exists, even though the server is installed and
      its cached_tools are populated in platform_mcp_servers.
    priority: P0
    status: covered

  # ---------------------------------------------------------------------------
  # Section I — Report Gate (two-step astonish-report contract)
  # ---------------------------------------------------------------------------
  # These three scenarios pin the boundary of the report-vs-artifact gate
  # introduced to fix the b5310ae regression. The contract: an artifact is
  # promoted to inline EmbeddedFileViewer rendering iff it is markdown,
  # produced in the last turn, AND the agent emitted a matching
  # ```astonish-report``` fence. Without all three signals, the artifact
  # renders as a compact ArtifactCard. CHAT-066 covers the negative path,
  # CHAT-067 covers the report_marker SSE event, and CHAT-068 covers the
  # positive end-to-end markdown+marker case.

  - id: CHAT-066
    title: "Plain write_file (no astonish-report fence) does not promote to a report"
    user_story: |
      As a user, when my agent writes a working file (e.g. a Python script)
      without emitting an astonish-report fence, the file appears as a
      compact ArtifactCard download tile and NOT as an inline embedded
      report viewer. The session detail's artifacts[] entry has
      isReport=false. Pins the negative path of the gate to prevent any
      future b5310ae-style "any last-turn artifact embeds" regression.
    priority: P0
    status: covered

  - id: CHAT-067
    title: "Agent emits astonish-report fence and a report_marker SSE event is delivered"
    user_story: |
      As a user, when my agent writes a markdown report AND emits the
      ```astonish-report``` fence with a matching path, the backend
      detects the fence and emits a report_marker SSE event whose path
