# Astonish Helm Chart - Default Values
# Override secrets and environment-specific settings in a values-*.yaml file
# (e.g. values-dev-proxmox.yaml). NEVER commit real secrets here.

# -- Container image settings (control plane: api + worker)
image:
  repository: ghcr.io/sap/astonish
  tag: dev
  pullPolicy: Always

# -- Namespace layout
# One prefix drives the names of all namespaces this chart creates. Default
# prefix "astonish" yields:
#   controlPlane: astonish          (must equal Release.Namespace)
#   sandbox:      astonish-sandbox
# Override `controlPlane` / `sandbox` explicitly only when you need a
# non-derived name.
namespaces:
  prefix: astonish
  controlPlane: ""       # "" -> "{prefix}"
  sandbox: ""            # "" -> "{prefix}-sandbox"

# -- ServiceAccount used by the control-plane pods (api + worker).
# It lives in the control-plane namespace and is granted a Role in the
# sandbox namespace via RoleBinding. When sandbox.enabled=true and
# sandbox.rbac.create=true, the SA is created and bound automatically.
serviceAccount:
  create: true
  # "" -> "{fullname}-daemon"
  name: ""

# -- API Deployment (stateless, horizontally scalable)
# Handles HTTP requests, SSE streaming, chat execution
api:
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- Worker Deployment (single replica, background tasks)
# Runs scheduler, channel integrations, fleet monitors
worker:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- Astonish configuration (rendered into config.yaml ConfigMap).
# Non-sandbox fields only — the sandbox block is derived from .Values.sandbox.*
# below and spliced in automatically (single source of truth).
config:
  storage:
    backend: postgres
    postgres:
      instanceSuffix: ""
      maxOpenConns: 25
      maxIdleConns: 5
      connMaxLifetimeMinutes: 30
  auth:
    mode: builtin
    allowRegistration: true
    defaultOrgName: ""
    defaultOrgSlug: ""
    accessTokenTTLMinutes: 15
    refreshTokenTTLDays: 90

# -- Secrets (set in values-*.yaml; NEVER commit real values here)
secrets:
  # Name of a pre-existing Kubernetes Secret containing master-key, jwt-secret,
  # and platform-dsn keys. When set, the chart does NOT create its own Secret
  # and all three fields below are ignored.
  existingSecret: ""
  # ASTONISH_MASTER_KEY: 64 hex characters (32 bytes AES-256 key)
  # Used for encrypting credentials at rest in the platform database.
  masterKey: ""
  # ASTONISH_JWT_SECRET: signing key for access/refresh tokens.
  # If empty, tokens won't survive pod restarts.
  jwtSecret: ""
  # ASTONISH_PLATFORM_DSN: PostgreSQL connection string for the platform database.
  # Format: postgres://user:pass@host:port/dbname?sslmode=disable
  platformDSN: ""

# -- Service configuration (API pods only)
service:
  type: ClusterIP
  port: 9393

# -- Ingress configuration
ingress:
  enabled: false
  className: nginx
  annotations:
    # Sticky sessions for SSE affinity (required until Phase 2 PG event polling)
    nginx.ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/session-cookie-name: astonish-sticky
    nginx.ingress.kubernetes.io/session-cookie-max-age: "3600"
    # SSE / long-lived connections
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Allow large request bodies (file attachments are base64 in JSON)
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
  hosts: []
  #  - host: astonish.example.com
  #    paths:
  #      - path: /
  #        pathType: Prefix
  tls: []
  #  - secretName: astonish-tls
  #    hosts:
  #      - astonish.example.com

# -- Horizontal Pod Autoscaler (API pods only)
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# -- Pod scheduling constraints (control plane)
nodeSelector: {}
tolerations: []
affinity: {}

# =============================================================================
# Service Mesh Integration
# =============================================================================
# Controls which mesh-specific resources (PeerAuthentication, AuthorizationPolicy,
# namespace annotations, pod annotations) the chart renders.
#
# mesh.provider selects the mesh. Supported values:
#   ""       — No mesh resources rendered. Use for clusters without a mesh,
#              or when managing mesh policies externally.
#   "istio"  — Renders Istio PeerAuthentication (PERMISSIVE on gateway) and
#              AuthorizationPolicies (mesh full access, sandbox restricted).
#              Adds istio-injection labels to namespaces.
#
# The relationship between mesh.provider and openshell.server.disableTls:
#   mesh.provider: "istio" + disableTls: true   → mesh encrypts (recommended)
#   mesh.provider: ""      + disableTls: false   → gateway's own mTLS (no mesh)
#   mesh.provider: ""      + disableTls: true    → plaintext (dev/testing only)
mesh:
  provider: ""

# =============================================================================
# Sandbox subsystem (Phase F)
# =============================================================================
# Creates the sandbox namespace, RBAC, PVCs, and base-layer seed Job. When
# disabled, only the control plane is installed and the daemon will be unable
# to create sandbox pods.
sandbox:
  enabled: true

  # PodSecurity admission profile for the sandbox namespace.
  # - baseline    : production default; fuse-overlayfs via device plugin OR
  #                 kernel overlayfs via hostUsers:false.
  # - privileged  : dev / lab only; required on LXC nodes and when using
  #                 in-container mknod for /dev/fuse.
  # - restricted  : not supported by the sandbox backend; sandbox pods need
  #                 at least baseline.
  podSecurity: baseline

  # Backend selector — canonical token used by the Go runtime.
  # Accepted values: "k8s" (this chart), "incus" (local dev).
  # Written verbatim into config.sandbox.backend.
  backend: k8s

  rbac:
    # Create the Role + RoleBinding in the sandbox namespace so the control-
    # plane ServiceAccount (in the control-plane namespace) can manage
    # sandbox pods.
    create: true

  # Sandbox base image — MUST ship the Phase F overlay entrypoint
  # (see docker/sandbox-base/Dockerfile).
  image:
    repository: ghcr.io/sap/astonish-sandbox-base
    tag: dev
    pullPolicy: IfNotPresent

  # Overlay strategy — drives applyPodSecurityHardening in the Go backend.
  # See docs/architecture/sandbox-backends.md §10.
  overlay:
    mode: fuse              # fuse | kernel | auto
    privileged: false       # set true on dev clusters using in-container mknod
    hostUsers: null         # null = omit field; true/false = emit as-is
    runtimeClassName: ""    # e.g. "sysbox-runc" for Sysbox clusters
    fuseDeviceResource: ""  # e.g. "smarter-devices/fuse" with a device plugin

  # RWX PVCs mounted into sandbox pods. StorageClass MUST provide RWX
  # (CephFS, EFS, Azure Files, NFS, Manila, ...). Required.
  storage:
    storageClassName: ""    # REQUIRED — see docs/deployment/kubernetes.md
    layers:
      size: 100Gi
      accessMode: ReadWriteMany
      pvcName: astonish-layers
    uppers:
      size: 50Gi
      accessMode: ReadWriteMany
      pvcName: astonish-uppers

  # One-shot Job that seeds astonish-layers/@base/rootfs from the sandbox
  # image. Runs as a Helm post-install / post-upgrade hook so bumping
  # sandbox.image.tag triggers a reseed automatically.
  seed:
    enabled: true
    backoffLimit: 6
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

  # ==========================================================================
  # OpenShell backend configuration (sandbox.backend = "openshell")
  # ==========================================================================
  # When enabled, deploys the NVIDIA OpenShell gateway as a Helm subchart in
  # the same namespace.
  #
  # Prerequisites (cluster-scoped, NOT managed by this chart):
  #   1. Agent Sandbox CRD + controller:
  #      kubectl apply -f https://github.com/kubernetes-sigs/agent-sandbox/releases/latest/download/manifest.yaml
  #   2. (Optional) Service mesh — set mesh.provider above to render mesh
  #      resources automatically. Without a mesh, set openshell.server.disableTls
  #      to false for gateway-native mTLS.
  openshell:
    # Enables the OpenShell subchart deployment.
    # Also gates the Chart.yaml dependency condition.
    enabled: false

    # Override gRPC address. Empty = auto-derived from release name:
    #   "{release}-openshell.{namespace}.svc.cluster.local:8080"
    gateway:
      addr: ""

    # Sandbox container image (Astonish agent tooling + OpenShell supervisor).
    image:
      repository: ghcr.io/sap/astonish-sandbox-openshell
      tag: dev

    # Container image registry for custom-built sandbox images.
    # Required for the automated image build pipeline (P1).
    registry:
      # OCI registry URL prefix. Images are pushed as:
      #   <url>/astonish-sandbox-<scope>:<content-hash>
      # Examples: "ghcr.io/sap", "ghcr.io/org", "harbor.internal:5000/astonish"
      url: ""
      # Name of the K8s Secret (type kubernetes.io/dockerconfigjson) used by Kaniko.
      # If username/password are provided below, the chart creates this secret automatically.
      secretName: ""
      # Direct credentials — when set, the chart creates the dockerconfigjson secret.
      # For Docker Hub: username is your Docker Hub username, password is a PAT.
      # For other registries: use appropriate credentials.
      username: ""
      password: ""

    # Kaniko-based image builder configuration.
    builder:
      # Pinned Kaniko executor image. Update to upgrade build tooling.
      image: "gcr.io/kaniko-project/executor:v1.23.2"
      # Namespace where build Jobs run. Empty = control-plane namespace.
      namespace: ""
      # Resource requests/limits for the Kaniko build pod.
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: "2"
          memory: 2Gi

    # Sandbox network egress policy.
    # The K8s NetworkPolicy allows all egress at L3/L4. Fine-grained
    # enforcement is handled by the OpenShell supervisor's network namespace
    # proxy, controlled by this config.
    #
    # IMPORTANT: The supervisor denies ALL traffic when no network policies
    # are configured. Presets resolve to a concrete allowlist that is always
    # sent to the supervisor so sandboxes have usable internet access.
    networkPolicy:
      # Presets to enable. Each preset is a named group of allowed endpoints.
      # Available: "default" (all below), "code_hosting", "package_registries",
      #   "llm_apis", "tools", "system", "search", "cdn"
      # When empty or contains "default", all presets are active.
      # Port 0 = defaults to 443 in the proto mapping layer.
      presets:
        - "default"
      # Additional endpoints beyond presets (operator-specific).
      # Useful for internal services, private repos, custom APIs.
      extraEndpoints: []
      # Example:
      # extraEndpoints:
      #   - host: "internal-api.mycompany.com"
      #     port: 443
      #   - host: "*.mycompany.com"
      #     port: 443
      #   - host: "apt.internal.mycompany.com"
      #     port: 80

    # Landlock LSM enforcement mode for sandbox processes.
    # "best_effort" (default): degrades gracefully on kernels without Landlock.
    # "hard_requirement": fails sandbox startup if Landlock can't be enforced.
    # Use "hard_requirement" for debugging Landlock-related issues (fast failure).
    landlockCompatibility: "best_effort"

    # Extend the default sandbox Landlock filesystem policy.
    # The base policy already includes:
    #   read-only:  /usr, /bin, /sbin, /lib, /lib64, /etc, /opt, /dev/null, /dev/urandom
    #   read-write: /sandbox, /tmp, /var/tmp, /home, /run, /dev/pts
    # Use this to add additional paths without modifying the default set.
    filesystemPolicy:
      extraReadOnly: []
      extraReadWrite: []
      # Example:
      # extraReadOnly:
      #   - /data/shared-models
      # extraReadWrite:
      #   - /mnt/scratch
      #   - /dev/fuse

    # Corporate CA / trust bundles mounted into every sandbox via OpenShell
    # driver_config (Kubernetes PVC mounts). Each entry references an existing
    # PVC in the sandbox namespace that holds a *combined* PEM (system CAs +
    # corporate roots). Mount paths must not be under /sandbox or
    # /etc/openshell{,-tls}. Trust env vars default to SSL_CERT_FILE,
    # CURL_CA_BUNDLE, REQUESTS_CA_BUNDLE, NODE_EXTRA_CA_CERTS, GIT_SSL_CAINFO.
    certBundles: []
    # Example:
    # certBundles:
    #   - name: corp-root-ca
    #     claimName: astonish-corp-ca
    #     mountPath: /etc/astonish-ca/ca-bundle.crt
    #     subPath: ca-bundle.crt
    #     # trustEnv: []  # use defaults, or override:
    #     # trustEnv:
    #     #   - SSL_CERT_FILE
    #     #   - NODE_EXTRA_CA_CERTS

    # Idle timeout (minutes) before the watchdog evicts an unused sandbox pod.
    # 0 = disable idle eviction (pods run indefinitely).
    # Evicted sessions are transparently recreated on next tool call (~5-10s).
    idleTimeoutMinutes: 240

    # Replace the default workspace PVC with emptyDir via Kyverno mutation.
    # The OpenShell gateway injects a 2Gi workspace PVC into every sandbox pod.
    # On Cinder-backed clusters this adds ~35s of provisioning latency.
    # When enabled, a Kyverno ClusterPolicy strips the volumeClaimTemplates
    # and replaces the workspace volume with emptyDir — zero PVC latency.
    # REQUIRES: Kyverno installed in the cluster.
    ephemeralWorkspace: false

  # Resource limits for sandbox session pods.
  # The "limits" block defines the per-session CEILING (cgroup throttle) —
  # equivalent to the Incus cgroup cap. A session can burst up to this
  # much but is throttled (CPU) or OOM-killed (memory) when exceeding.
  #
  # The "requests" block defines the K8s SCHEDULER RESERVATION (idle floor).
  # This is what the scheduler subtracts from node allocatable when placing
  # a pod. Keep this LOW for high session density — most sessions idle
  # waiting for user input. When zero, the Go backend auto-derives
  # requests using a built-in ratio (5% CPU, 12.5% memory of limit).
  #
  # Mental model:
  #   limits  = "what one session can burst to" (per-pod, like Incus)
  #   requests = "how densely sessions pack onto nodes" (fleet capacity)
  #
  # On a 4-CPU / 16Gi node with the defaults below (~100m CPU / 256Mi):
  #   ~40 sessions fit by CPU, ~64 by memory — practical: ~40 idle sessions.
  #   Under simultaneous load, kernel time-slices fairly within limits.
  limits:
    cpu: 2              # whole cores (K8s limits.cpu ceiling)
    memory: "2GB"       # ceiling; accepts Incus "2GB" or K8s "2Gi" syntax
    processes: 500      # Incus-only; ignored by K8s backend
  requests:
    # K8s-only (ignored by Incus). Zero = auto-derive from limits.
    cpuMillis: 100      # 100m = 0.1 CPU scheduler reservation
    memoryMiB: 256      # 256Mi scheduler reservation

# =============================================================================
# Optional FUSE device plugin DaemonSet (smarter-device-manager reference).
# =============================================================================
# Only needed in production when sandbox.overlay.fuseDeviceResource is set to
# `smarter-devices/fuse` and the cluster does not already ship a FUSE device
# plugin. Dev clusters using sandbox.overlay.privileged=true do NOT need this.
fuseDevicePlugin:
  enabled: false
  namespace: kube-system
  image:
    repository: registry.gitlab.com/arm-research/smarter/smarter-device-manager
    tag: v1.20.11
    pullPolicy: IfNotPresent
  # nodeSelector restricts which nodes advertise the resource. Leave empty
  # `{}` to run on every node.
  nodeSelector:
    smarter-device-manager: enabled
  # Number of /dev/fuse handles advertised per node.
  nummaxdevices: 20
  resources:
    requests:
      cpu: 10m
      memory: 15Mi
    limits:
      cpu: 100m
      memory: 50Mi

# =============================================================================
# OpenShell subchart values (forwarded to the NVIDIA OpenShell Helm chart)
# =============================================================================
# These are passed verbatim to the subchart via its alias "openshell".
# Only rendered when sandbox.openshell.enabled=true (Chart.yaml condition).
#
# When mesh.provider is set, Istio/Linkerd handles encryption and the gateway
# can listen plaintext (disableTls: true). Without a mesh, set disableTls: false
# to use the gateway's built-in mTLS with auto-generated certificates.
openshell:
  nameOverride: openshell

  server:
    # Gateway TLS mode.
    # true  = plaintext; rely on service mesh for encryption (recommended with mesh.provider)
    # false = gateway terminates mTLS itself (recommended without mesh.provider)
    disableTls: true
    # Sandbox pods are created in the sandbox namespace managed by this chart.
    # Must match the computed value of include "astonish.namespace.sandbox".
    sandboxNamespace: "astonish-sandbox"
    # Default sandbox image — Astonish agent tooling.
    # Must match sandbox.openshell.image.repository:tag above.
    sandboxImage: "ghcr.io/sap/astonish-sandbox-openshell:dev"
    # Always pull sandbox image so :dev tag updates are picked up immediately.
    sandboxImagePullPolicy: "Always"
    auth:
      # When mesh.provider is set, the mesh AuthorizationPolicy handles identity.
      # Without a mesh, consider setting this to false and configuring gateway auth.
      allowUnauthenticatedUsers: true
    tls:
      # Disable mTLS client certificate verification when using a service mesh
      # or when disableTls=true. Set to a Secret name containing the client CA
      # when using gateway-native mTLS without a mesh.
      clientCaSecretName: ""

  # The pkiInitJob MUST remain enabled: it generates the JWT signing keypair
  # (astonish-openshell-jwt-keys) that the gateway always mounts for sandbox
  # token issuance. As a side effect it also creates TLS secrets that are
  # unused when disableTls=true — these are inert and harmless.
  pkiInitJob:
    enabled: true

  # We manage our own NetworkPolicies (templates/openshell/networkpolicy.yaml).
  networkPolicy:
    enabled: false
